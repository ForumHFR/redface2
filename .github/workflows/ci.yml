name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build, lint and test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/android-sdk:36
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify
        run: ./gradlew detektAll lintDebug testDebugUnitTest :app:assembleDebug
